name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify build
        run: go build ./...
      - name: Run tests
        run: go test ./...
      - name: Replay policy fixtures
        run: go run ./tools/replay -fixtures ./tools/replay/fixtures/policy_cases.json
